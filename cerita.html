<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cerita Kita — Lovee</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Playfair+Display:ital,wght@0,900;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            min-height: 100vh;
            overflow: hidden;
        }

        .scene {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .orbit-container {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Spinning 3D Orbit Ring */
        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: spinParent 28s linear infinite;
        }

        /* Individual orbiting items */
        .orbit-item {
            position: absolute;
            width: 90px;
            height: 125px;
            transform-style: preserve-3d;
            left: calc(50% - 45px);
            top: calc(50% - 62.5px);
        }

        /* Counter-rotation for billboarding */
        .orbit-item-content {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: spinChild 28s linear infinite;
        }

        /* 3D Orbit Positions (Radius is 260px on desktop, 150px on mobile) */
        @media (min-width: 768px) {
            .item-1 { transform: rotateY(0deg) translateZ(260px); }
            .item-2 { transform: rotateY(60deg) translateZ(260px); }
            .item-3 { transform: rotateY(120deg) translateZ(260px); }
            .item-4 { transform: rotateY(180deg) translateZ(260px); }
            .item-5 { transform: rotateY(240deg) translateZ(260px); }
            .item-6 { transform: rotateY(300deg) translateZ(260px); }
        }
        @media (max-width: 767px) {
            .orbit-item {
                width: 70px;
                height: 98px;
                left: calc(50% - 35px);
                top: calc(50% - 49px);
            }
            .item-1 { transform: rotateY(0deg) translateZ(145px); }
            .item-2 { transform: rotateY(60deg) translateZ(145px); }
            .item-3 { transform: rotateY(120deg) translateZ(145px); }
            .item-4 { transform: rotateY(180deg) translateZ(145px); }
            .item-5 { transform: rotateY(240deg) translateZ(145px); }
            .item-6 { transform: rotateY(300deg) translateZ(145px); }
        }

        @keyframes spinParent {
            0% { transform: rotateX(-12deg) rotateY(0deg); }
            100% { transform: rotateX(-12deg) rotateY(360deg); }
        }

        @keyframes spinChild {
            0% { transform: rotateY(0deg) rotateX(12deg); }
            100% { transform: rotateY(-360deg) rotateX(12deg); }
        }

        /* Central Beating Heart with 3D shadow and scale pulse */
        .central-heart {
            position: absolute;
            z-index: 10;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            animation: pulse3D 2.2s ease-in-out infinite;
        }

        @media (max-width: 767px) {
            .central-heart {
                width: 120px;
                height: 120px;
            }
        }

        @keyframes pulse3D {
            0%, 100% { transform: scale(1) translateZ(10px); filter: drop-shadow(0 15px 35px rgba(244,63,94,0.45)); }
            50% { transform: scale(1.1) translateZ(35px); filter: drop-shadow(0 25px 55px rgba(244,63,94,0.7)); }
        }

        /* Aesthetic styling for 3D look */
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4), 0 8px 10px -6px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="select-none overflow-hidden bg-[#020617]">
    
    <!-- Stars Background Effect -->
    <div class="fixed inset-0 pointer-events-none opacity-30" id="stars-bg"></div>
    
    <!-- Navigation Back Link -->
    <div class="absolute top-8 left-8 z-30">
        <a href="index.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs font-bold tracking-wider text-white/60 hover:text-white transition-all hover:scale-105 active:scale-95">
            &larr; Beranda
        </a>
    </div>

    <!-- Glowing header titles from reference photo -->
    <div class="absolute top-16 left-0 right-0 text-center z-20 pointer-events-none">
        <h1 class="text-4xl md:text-5xl font-black tracking-widest text-[#f5ebd6] font-serif uppercase drop-shadow-md">
            For you
        </h1>
        <p class="text-[10px] md:text-xs text-white/30 tracking-widest mt-2 uppercase font-semibold">
            From Someone
        </p>
    </div>

    <!-- Ambient 3D background glows -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] md:w-[500px] md:h-[500px] bg-rose-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- 3D Scene Viewport -->
    <div class="scene">
        <div class="orbit-container">
            
            <!-- Central Beating 3D Heart -->
            <div class="central-heart">
                <!-- Glossy pinkish-red 3D heart SVG -->
                <svg class="w-full h-full text-rose-500" viewBox="0 0 24 24" fill="currentColor" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.3))">
                    <defs>
                        <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff6b8b" />
                            <stop offset="40%" stop-color="#f43f5e" />
                            <stop offset="100%" stop-color="#be123c" />
                        </linearGradient>
                    </defs>
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#heartGrad)" />
                </svg>
            </div>

            <!-- Tilted 3D Orbiting Ring -->
            <div class="ring">
                
                <!-- Item 1: Polaroid photo of a couple/heart -->
                <div class="orbit-item item-1">
                    <div class="orbit-item-content">
                        <div class="w-full h-full bg-[#fbfbf9] p-2 pb-5 border border-[#e5e5df] rounded-lg card-shadow flex flex-col justify-between">
                            <div class="w-full aspect-square bg-[#0c1a1a] rounded flex items-center justify-center relative overflow-hidden">
                                <!-- Vector sketch of couple / love -->
                                <svg class="w-8 h-8 text-rose-400 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                                </svg>
                            </div>
                            <div class="h-2 w-10 bg-gray-200 rounded mx-auto mt-2"></div>
                        </div>
                    </div>
                </div>

                <!-- Item 2: Alphabet Block "B" -->
                <div class="orbit-item item-2">
                    <div class="orbit-item-content">
                        <div class="w-full h-full bg-[#f5eedc] border-2 border-[#dcd2be] rounded-2xl card-shadow flex items-center justify-center">
                            <span class="text-4xl md:text-5xl font-black text-[#56493b] font-serif tracking-tighter">B</span>
                        </div>
                    </div>
                </div>

                <!-- Item 3: Bouquet of Roses Wrap -->
                <div class="orbit-item item-3">
                    <div class="orbit-item-content">
                        <div class="w-full h-full bg-[#fbfbf9] border border-[#e5e5df] rounded-2xl card-shadow p-2 flex flex-col items-center justify-center">
                            <!-- Wrapped flowers layout -->
                            <div class="relative w-12 h-16 flex flex-col items-center justify-center">
                                <!-- Flower buds -->
                                <div class="absolute top-0 flex gap-1 z-10">
                                    <circle cx="0" cy="0" r="4.5" fill="#f43f5e" class="text-rose-500" />
                                    <circle cx="0" cy="0" r="4.5" fill="#fb7185" class="text-pink-400" />
                                    <circle cx="0" cy="0" r="4.5" fill="#f43f5e" class="text-rose-500" />
                                </div>
                                <!-- Wrapping paper triangle cone -->
                                <path d="M 0 30 L -15 -10 L 15 -10 Z" fill="#d2b48c" />
                                <svg class="w-full h-full text-[#cfbda0]" viewBox="0 0 100 100" fill="currentColor">
                                    <polygon points="50,90 20,30 80,30" />
                                    <polygon points="50,90 25,35 50,45" fill="#c3b091" />
                                    <polygon points="50,90 75,35 50,45" fill="#bfae90" />
                                </svg>
                            </div>
                            <span class="text-[8px] font-semibold text-[#8b5a2b] uppercase tracking-widest mt-1">Bouquet</span>
                        </div>
                    </div>
                </div>

                <!-- Item 4: Alphabet Block "A" -->
                <div class="orbit-item item-4">
                    <div class="orbit-item-content">
                        <div class="w-full h-full bg-[#f5eedc] border-2 border-[#dcd2be] rounded-2xl card-shadow flex items-center justify-center">
                            <span class="text-4xl md:text-5xl font-black text-[#56493b] font-serif tracking-tighter">A</span>
                        </div>
                    </div>
                </div>

                <!-- Item 5: Greeting Flower Painting Card -->
                <div class="orbit-item item-5">
                    <div class="orbit-item-content">
                        <div class="w-full h-full bg-[#fbfbf9] border border-[#e5e5df] rounded-2xl card-shadow p-2 flex flex-col justify-between">
                            <div class="w-full h-[75%] border border-[#f0eee4] bg-[#faf8f0] rounded-xl flex items-center justify-center p-1.5 overflow-hidden">
                                <!-- Delicate vase painting inside -->
                                <svg class="w-full h-full text-rose-400" viewBox="0 0 40 40" fill="currentColor">
                                    <!-- Vase -->
                                    <ellipse cx="20" cy="30" rx="6" ry="7" fill="#67e8f9" opacity="0.6" />
                                    <rect x="18" y="20" width="4" height="6" fill="#67e8f9" opacity="0.6" />
                                    <!-- Flower stems and heads -->
                                    <path d="M20 20 L20 10 M17 22 L12 12 M23 22 L28 13" stroke="#84cc16" stroke-width="0.8" />
                                    <circle cx="20" cy="9" r="2.5" fill="#f43f5e" />
                                    <circle cx="12" cy="11" r="2.5" fill="#a855f7" />
                                    <circle cx="28" cy="12" r="2.5" fill="#fbbf24" />
                                </svg>
                            </div>
                            <span class="text-[8px] text-center font-bold tracking-widest text-[#a855f7] uppercase mb-1">Painting</span>
                        </div>
                    </div>
                </div>

                <!-- Item 6: Glassmorphic Music Player -->
                <div class="orbit-item item-6">
                    <div class="orbit-item-content">
                        <div class="w-full h-full bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl card-shadow p-3 flex flex-col justify-between text-white/95">
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs">🎵</span>
                                <div class="overflow-hidden w-full">
                                    <div class="text-[7px] font-black uppercase tracking-widest truncate animate-pulse">Playing Love</div>
                                </div>
                            </div>
                            <!-- Mini play controls -->
                            <div class="space-y-1.5 mb-1">
                                <div class="w-full h-1 bg-white/20 rounded-full overflow-hidden">
                                    <div class="w-2/3 h-full bg-white rounded-full"></div>
                                </div>
                                <div class="flex items-center justify-center gap-2">
                                    <span class="text-[7px]">⏮️</span>
                                    <span class="text-[9px]">⏸️</span>
                                    <span class="text-[7px]">⏭️</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            
        </div>
    </div>

    <!-- Star Initialization script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const starsBg = document.getElementById('stars-bg');
            if (starsBg) {
                const starCount = window.innerWidth < 768 ? 70 : 100;
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    const isTwinkle = Math.random() > 0.6;
                    const colorRand = Math.random();
                    let color = '#ffffff';
                    let shadowColor = 'rgba(255, 255, 255, 0.5)';
                    if (colorRand > 0.85) {
                        color = '#bae6fd';
                        shadowColor = 'rgba(56, 189, 248, 0.8)';
                    } else if (colorRand > 0.7) {
                        color = '#a5f3fc';
                        shadowColor = 'rgba(34, 211, 238, 0.8)';
                    }
                    star.className = `absolute rounded-full star-dot${isTwinkle ? ' animate-twinkle' : ''}`;
                    const size = Math.random() * 3.2 + 0.8;
                    star.style.backgroundColor = color;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.opacity = String(Math.random() * 0.8 + 0.2);
                    star.style.animationDelay = Math.random() * 5 + 's';
                    if (window.innerWidth >= 768) {
                        star.style.boxShadow = `0 0 ${size * 1.5}px ${shadowColor}`;
                    }
                    fragment.appendChild(star);
                }
                starsBg.appendChild(fragment);
            }
        });
    </script>
</body>
</html>
