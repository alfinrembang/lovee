<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cerita Kita — Lovee</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Playfair+Display:ital,wght@0,900;1,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            min-height: 100vh;
            overflow: hidden;
        }

        .scene {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .orbit-container {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Spinning 3D Orbit Ring */
        .orbit-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: spinParent 28s linear infinite;
        }

        /* Individual orbiting items */
        .orbit-item {
            position: absolute;
            width: 105px;
            height: 145px;
            transform-style: preserve-3d;
            left: calc(50% - 52.5px);
            top: calc(50% - 72.5px);
        }

        /* 3D Double-Sided Card Container */
        .card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Card Face Styles */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Sisi Depan: Polaroid Photo Frame (Faces Outward) */
        .card-front {
            background: #fbfbf9;
            border: 1px solid #e5e5df;
            padding: 0.5rem;
            padding-bottom: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4), 0 8px 10px -6px rgba(0,0,0,0.4);
            transform: rotateY(0deg);
        }

        /* Sisi Belakang: Vintage Alphabet Block (Faces Inward) */
        .card-back {
            background: #f5eedc;
            border: 2px solid #dcd2be;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4), 0 8px 10px -6px rgba(0,0,0,0.4);
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Orbit Positions (Radius is 290px on desktop, 165px on mobile) */
        @media (min-width: 768px) {
            .item-1 { transform: rotateY(0deg) translateZ(290px); }
            .item-2 { transform: rotateY(288deg) translateZ(290px); }
            .item-3 { transform: rotateY(216deg) translateZ(290px); }
            .item-4 { transform: rotateY(144deg) translateZ(290px); }
            .item-5 { transform: rotateY(72deg) translateZ(290px); }
        }
        @media (max-width: 767px) {
            .orbit-item {
                width: 82px;
                height: 115px;
                left: calc(50% - 41px);
                top: calc(50% - 57.5px);
            }
            .item-1 { transform: rotateY(0deg) translateZ(165px); }
            .item-2 { transform: rotateY(288deg) translateZ(165px); }
            .item-3 { transform: rotateY(216deg) translateZ(165px); }
            .item-4 { transform: rotateY(144deg) translateZ(165px); }
            .item-5 { transform: rotateY(72deg) translateZ(165px); }
        }

        @keyframes spinParent {
            0% { transform: rotateX(-12deg) rotateY(0deg); }
            100% { transform: rotateX(-12deg) rotateY(360deg); }
        }

        /* Central Beating Heart with 3D shadow and scale pulse */
        .central-heart {
            position: absolute;
            z-index: 10;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            animation: pulse3D 2.2s ease-in-out infinite;
        }

        @media (max-width: 767px) {
            .central-heart {
                width: 120px;
                height: 120px;
            }
        }

        @keyframes pulse3D {
            0%, 100% { transform: scale(1) translateZ(10px); filter: drop-shadow(0 15px 35px rgba(244,63,94,0.45)); }
            50% { transform: scale(1.1) translateZ(35px); filter: drop-shadow(0 25px 55px rgba(244,63,94,0.7)); }
        }
    </style>
</head>
<body class="select-none overflow-hidden bg-[#020617]">
    
    <!-- Stars Background Effect -->
    <div class="fixed inset-0 pointer-events-none opacity-30" id="stars-bg"></div>
    
    <!-- Navigation Back Link -->
    <div class="absolute top-8 left-8 z-30">
        <a href="index.html?skip=1" class="inline-flex items-center gap-2 px-5 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs font-bold tracking-wider text-white/60 hover:text-white transition-all hover:scale-105 active:scale-95">
            &larr; Beranda
        </a>
    </div>

    <!-- Glowing header titles from reference photo -->
    <div class="absolute top-16 left-0 right-0 text-center z-20 pointer-events-none">
        <h1 class="text-4xl md:text-5xl font-black tracking-widest text-[#f5ebd6] font-serif uppercase drop-shadow-md">
            For you
        </h1>
        <p class="text-[10px] md:text-xs text-white/30 tracking-widest mt-2 uppercase font-semibold">

    </div>

    <!-- Soft Ambient Lights behind the heart -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] md:w-[500px] md:h-[500px] bg-rose-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- 3D Scene Viewport -->

        <div class="orbit-container">
            
            <!-- Central Beating 3D Heart -->
            <div class="central-heart">

                    <defs>
                        <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff6b8b" />
                            <stop offset="40%" stop-color="#f43f5e" />
                            <stop offset="100%" stop-color="#be123c" />
                        </linearGradient>
                    </defs>
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#heartGrad)" />

            <!-- Tilted 3D Orbiting Ring -->

                <!-- Item 1: Letter A (Back) / Polaroid 1 (Front) -->
                <div class="orbit-item item-1">
                    <div class="card-3d">
                        <!-- Front Face: Polaroid Photo Placeholder -->
                        <div class="card-face card-front">
                            <div class="w-full aspect-square bg-[#0d1527] rounded-lg flex flex-col items-center justify-center p-2 relative overflow-hidden">
                                <!-- Photo Placeholder Art -->
                                <svg class="w-7 h-7 text-pink-400/40 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
                                </svg>
                                <span class="text-[7px] text-pink-400/35 font-bold uppercase tracking-wider">Photo #1</span>
                            </div>
                            <span class="text-[9px] text-center font-bold text-gray-400 font-serif italic mt-1.5 block">Our Story 🌸</span>
                        </div>
                        <!-- Back Face: Vintage Block "A" -->
                        <div class="card-face card-back">
                            <span class="text-4xl md:text-5xl font-black text-[#56493b] font-serif tracking-tighter">A</span>
                        </div>
                    </div>
                </div>

                <!-- Item 2: Letter R (Back) / Polaroid 2 (Front) -->
                <div class="orbit-item item-2">
                    <div class="card-3d">
                        <!-- Front Face: Polaroid Photo Placeholder -->
                        <div class="card-face card-front">
                            <div class="w-full aspect-square bg-[#0d1527] rounded-lg flex flex-col items-center justify-center p-2 relative overflow-hidden">
                                <svg class="w-7 h-7 text-rose-400/40 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                                </svg>
                                <span class="text-[7px] text-rose-400/35 font-bold uppercase tracking-wider">Photo #2</span>
                            </div>
                            <span class="text-[9px] text-center font-bold text-gray-400 font-serif italic mt-1.5 block">Together ✨</span>
                        </div>
                        <!-- Back Face: Vintage Block "R" -->
                        <div class="card-face card-back">
                            <span class="text-4xl md:text-5xl font-black text-[#56493b] font-serif tracking-tighter">R</span>
                        </div>
                    </div>
                </div>

                <!-- Item 3: Letter N (Back) / Polaroid 3 (Front) -->
                <div class="orbit-item item-3">
                    <div class="card-3d">
                        <!-- Front Face: Polaroid Photo Placeholder -->
                        <div class="card-face card-front">
                            <div class="w-full aspect-square bg-[#0d1527] rounded-lg flex flex-col items-center justify-center p-2 relative overflow-hidden">
                                <svg class="w-7 h-7 text-indigo-400/40 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" />
                                </svg>
                                <span class="text-[7px] text-indigo-400/35 font-bold uppercase tracking-wider">Photo #3</span>
                            </div>
                            <span class="text-[9px] text-center font-bold text-gray-400 font-serif italic mt-1.5 block">Deep Love 💖</span>
                        </div>
                        <!-- Back Face: Vintage Block "N" -->
                        <div class="card-face card-back">
                            <span class="text-4xl md:text-5xl font-black text-[#56493b] font-serif tracking-tighter">N</span>
                        </div>
                    </div>
                </div>

                <!-- Item 4: Letter I (Back) / Polaroid 4 (Front) -->
                <div class="orbit-item item-4">
                    <div class="card-3d">
                        <!-- Front Face: Polaroid Photo Placeholder -->
                        <div class="card-face card-front">
                            <div class="w-full aspect-square bg-[#0d1527] rounded-lg flex flex-col items-center justify-center p-2 relative overflow-hidden">
                                <svg class="w-7 h-7 text-purple-400/40 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499c.172-.375.666-.375.838 0l2.14 4.337 4.787.696c.414.06.58.566.28.858l-3.464 3.376.818 4.768c.073.424-.37.74-.753.54L12 15.711l-4.284 2.253c-.383.2-.826-.117-.753-.54l.82-4.768-3.464-3.376c-.3-.292-.134-.799.28-.858l4.788-.696 2.14-4.337Z" />
                                </svg>
                                <span class="text-[7px] text-purple-400/35 font-bold uppercase tracking-wider">Photo #4</span>
                            </div>
                            <span class="text-[9px] text-center font-bold text-gray-400 font-serif italic mt-1.5 block">Forever 🌟</span>
                        </div>
                        <!-- Back Face: Vintage Block "I" -->
                        <div class="card-face card-back">
                            <span class="text-4xl md:text-5xl font-black text-[#56493b] font-serif tracking-tighter">I</span>
                        </div>
                    </div>
                </div>

                <!-- Item 5: Letter L (Back) / Polaroid 5 (Front) -->
                <div class="orbit-item item-5">
                    <div class="card-3d">
                        <!-- Front Face: Polaroid Photo Placeholder -->
                        <div class="card-face card-front">
                            <div class="w-full aspect-square bg-[#0d1527] rounded-lg flex flex-col items-center justify-center p-2 relative overflow-hidden">
                                <svg class="w-7 h-7 text-teal-400/40 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697-.056-4.024-.166C6.845 7.996 6 7.114 6 6.086V5.25c0-1.028.845-1.91 1.976-1.998A48.124 48.124 0 0 1 12 3c1.344 0 2.673.044 3.987.13A2.016 2.016 0 0 1 18 5.127V6.08c0 1.028-.845 1.91-1.976 1.998A47.96 47.96 0 0 1 12 8.25ZM12 8.25v7.5m0-7.5a47.935 47.935 0 0 0-4.024.166C6.845 16.004 6 16.886 6 17.914v.836C6 19.78 6.845 20.66 7.976 20.75A48.156 48.156 0 0 0 12 21c1.344 0 2.673-.044 3.987-.13A2.016 2.016 0 0 0 18 18.873v-.83c0-1.028-.845-1.91-1.976-1.998A47.96 47.96 0 0 0 12 15.75Z" />
                                </svg>
                                <span class="text-[7px] text-teal-400/35 font-bold uppercase tracking-wider">Photo #5</span>
                            </div>
                            <span class="text-[9px] text-center font-bold text-gray-400 font-serif italic mt-1.5 block">Always 🍃</span>
                        </div>
                        <!-- Back Face: Vintage Block "L" -->
                        <div class="card-face card-back">
                            <span class="text-4xl md:text-5xl font-black text-[#56493b] font-serif tracking-tighter">L</span>
                        </div>
                    </div>
                </div>

            </div>
            
        </div>
    </div>

    <!-- Star Initialization script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const starsBg = document.getElementById('stars-bg');
            if (starsBg) {
                const starCount = window.innerWidth < 768 ? 70 : 100;
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    const isTwinkle = Math.random() > 0.6;
                    const colorRand = Math.random();
                    let color = '#ffffff';
                    let shadowColor = 'rgba(255, 255, 255, 0.5)';
                    if (colorRand > 0.85) {
                        color = '#bae6fd';
                        shadowColor = 'rgba(56, 189, 248, 0.8)';
                    } else if (colorRand > 0.7) {
                        color = '#a5f3fc';
                        shadowColor = 'rgba(34, 211, 238, 0.8)';
                    }
                    star.className = `absolute rounded-full star-dot${isTwinkle ? ' animate-twinkle' : ''}`;
                    const size = Math.random() * 3.2 + 0.8;
                    star.style.backgroundColor = color;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.opacity = String(Math.random() * 0.8 + 0.2);
                    star.style.animationDelay = Math.random() * 5 + 's';
                    if (window.innerWidth >= 768) {
                        star.style.boxShadow = `0 0 ${size * 1.5}px ${shadowColor}`;
                    }
                    fragment.appendChild(star);
                }
                starsBg.appendChild(fragment);
            }
        });
    </script>
</body>
</html>
