<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Secret for You ❤️</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        /* Flower Animation Styles */
        .stem {
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
            animation: growStem 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .leaf-1 {
            transform-origin: 100px 150px;
            transform: scale(0);
            animation: growLeaf 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards;
        }

        .leaf-2 {
            transform-origin: 100px 120px;
            transform: scale(0);
            animation: growLeaf 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s forwards;
        }

        .petal-group use {
            transform-origin: 100px 80px;
            transform: scale(0);
            animation: bloomPetal 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Staggered blooming delays */
        .p-0 use { animation-delay: 1.5s; }
        .p-90 use { animation-delay: 1.6s; }
        .p-180 use { animation-delay: 1.7s; }
        .p-270 use { animation-delay: 1.8s; }

        .p-45 use { animation-delay: 1.9s; }
        .p-135 use { animation-delay: 2.0s; }
        .p-225 use { animation-delay: 2.1s; }
        .p-315 use { animation-delay: 2.2s; }

        .flower-core {
            transform-origin: 100px 80px;
            transform: scale(0);
            animation: bloomCore 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 2.3s forwards;
        }

        @keyframes growStem {
            to { stroke-dashoffset: 0; }
        }

        @keyframes growLeaf {
            to { transform: scale(1); }
        }

        @keyframes bloomPetal {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes bloomCore {
            to { transform: scale(1); }
        }

        .animate-pulse-slow {
            animation: pulseSlow 2s ease-in-out infinite;
        }

        @keyframes pulseSlow {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body class="bg-[#f0f7ff] min-h-screen flex items-center justify-center p-8 selection:bg-pink-200 secret-body overflow-hidden">
    
    <!-- Flower Blooming Overlay -->
    <div id="flower-container" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#020617] transition-all duration-[1500ms] ease-in-out">
        <div class="relative flex flex-col items-center justify-center">
            <!-- Glow background behind flower -->
            <div class="absolute w-48 h-48 bg-pink-500/20 rounded-full blur-[60px] animate-pulse"></div>
            
            <svg class="w-64 h-64 drop-shadow-[0_0_25px_rgba(236,72,153,0.35)]" viewBox="0 0 200 200">
                <defs>
                    <!-- Perfect romantic tear-drop petal pointing up, origin at 100, 80 -->
                    <path id="petal" d="M100 80 C80 50 75 30 100 15 C125 30 120 50 100 80" />
                </defs>

                <!-- Stem -->
                <path class="stem" d="M100 200 Q95 140 100 80" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" />
                
                <!-- Leaves -->
                <path class="leaf leaf-1" d="M100 150 Q75 140 85 125 Q95 130 100 150" fill="#22c55e" />
                <path class="leaf leaf-2" d="M100 120 Q125 110 115 95 Q105 100 100 120" fill="#22c55e" />
                
                <!-- Flower Head Group centered at (100, 80) -->
                <g class="flower-head">
                    <!-- Petals -->
                    <g class="petal-group p-0" style="transform-origin: 100px 80px;"><use href="#petal" fill="#f43f5e" /></g>
                    <g class="petal-group p-45" style="transform: rotate(45deg); transform-origin: 100px 80px;"><use href="#petal" fill="#f472b6" /></g>
                    <g class="petal-group p-90" style="transform: rotate(90deg); transform-origin: 100px 80px;"><use href="#petal" fill="#ec4899" /></g>
                    <g class="petal-group p-135" style="transform: rotate(135deg); transform-origin: 100px 80px;"><use href="#petal" fill="#fb7185" /></g>
                    <g class="petal-group p-180" style="transform: rotate(180deg); transform-origin: 100px 80px;"><use href="#petal" fill="#f43f5e" /></g>
                    <g class="petal-group p-225" style="transform: rotate(225deg); transform-origin: 100px 80px;"><use href="#petal" fill="#f472b6" /></g>
                    <g class="petal-group p-270" style="transform: rotate(270deg); transform-origin: 100px 80px;"><use href="#petal" fill="#ec4899" /></g>
                    <g class="petal-group p-315" style="transform: rotate(315deg); transform-origin: 100px 80px;"><use href="#petal" fill="#fb7185" /></g>
                    
                    <!-- Center Core -->
                    <circle class="flower-core" cx="100" cy="80" r="10" fill="#fef08a" />
                </g>
            </svg>
            
            <!-- Elegant Loading/Blooming Text -->
            <p class="mt-8 text-pink-400 font-semibold tracking-widest text-sm uppercase animate-pulse-slow">
                Mekar khusus untukmu... 🌸
            </p>
        </div>
    </div>

    <!-- Main Secret Card Content -->
    <div id="secret-card" class="max-w-md w-full bg-white/80 backdrop-blur-xl border border-white p-12 rounded-[3rem] shadow-2xl shadow-pink-200/50 text-center opacity-0 translate-y-8 pointer-events-none transition-all duration-1000 ease-out z-10">
        <div class="mb-8 inline-flex items-center justify-center w-16 h-16 bg-pink-100 rounded-full shadow-inner animate-bounce">
            <span class="text-2xl">✉️</span>
        </div>
        
        <h1 class="text-3xl font-black text-pink-950 mb-6 tracking-tight">You found it!</h1>
        
        <p class="text-pink-900/60 leading-relaxed mb-10 font-light text-base">
            "Sometimes the smallest step in the right direction ends up being the biggest step of your life."
            <br><br>
            Stay kind, stay loving, and keep spreading the magic.
        </p>

        <a href="index.html" class="inline-block text-sm font-bold text-pink-500 hover:text-pink-600 transition-colors hover:scale-105 active:scale-95 duration-300">
            &larr; Back to Home
        </a>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 right-0 w-64 h-64 bg-pink-200/20 blur-[100px] rounded-full -mr-32 -mt-32"></div>
    <div class="fixed bottom-0 left-0 w-64 h-64 bg-rose-200/20 blur-[100px] rounded-full -ml-32 -mb-32"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('flower-container');
            
            // Generate soft floating hearts around the flower
            if (container) {
                const createFloatingHeart = () => {
                    if (container.classList.contains('opacity-0')) return;
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.className = 'absolute text-xs pointer-events-none text-pink-500/40 select-none';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = '100vh';
                    
                    const size = Math.random() * 14 + 8;
                    heart.style.fontSize = size + 'px';
                    
                    const duration = Math.random() * 3 + 4; // 4s to 7s
                    heart.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-out`;
                    container.appendChild(heart);

                    requestAnimationFrame(() => {
                        heart.style.transform = `translateY(-105vh) translateX(${(Math.random() - 0.5) * 100}px) rotate(${Math.random() * 360}deg)`;
                    });

                    setTimeout(() => {
                        heart.remove();
                    }, duration * 1000);
                };

                // Create hearts periodically
                const heartInterval = setInterval(createFloatingHeart, 350);

                // After 4.8 seconds, smoothly fade out flower container and reveal the card
                setTimeout(() => {
                    clearInterval(heartInterval);
                    container.classList.add('opacity-0', 'pointer-events-none');
                    
                    const secretCard = document.getElementById('secret-card');
                    if (secretCard) {
                        secretCard.classList.remove('opacity-0', 'translate-y-8', 'pointer-events-none');
                        secretCard.classList.add('opacity-100', 'translate-y-0');
                    }
                }, 4800);
            }
        });
    </script>
</body>
</html>
