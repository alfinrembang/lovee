<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Secret for You ❤️</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        /* Flower Animation Styles */
        .blooming-item {
            transform: scale(0) rotate(var(--rot-start));
            opacity: 0;
            animation: bloomProcedural 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes bloomProcedural {
            0% {
                transform: scale(0) rotate(var(--rot-start));
                opacity: 0;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: scale(var(--scale-end)) rotate(var(--rot-end));
                opacity: 1;
            }
        }

        .animate-pulse-slow {
            animation: pulseSlow 2.5s ease-in-out infinite;
        }

        @keyframes pulseSlow {
            0%, 100% { opacity: 0.8; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1.04); }
        }
    </style>
</head>
<body class="bg-[#f0f7ff] min-h-screen flex items-center justify-center p-8 selection:bg-pink-200 secret-body overflow-hidden">
    
    <!-- Hidden SVG templates for procedural flower wall -->
    <svg style="display: none;">
        <defs>
            <!-- Leaf template -->
            <g id="flower-leaf">
                <path d="M 0 0 C -10 -10 -15 -25 0 -35 C 15 -25 10 -10 0 0" fill="#15803d" />
                <path d="M 0 0 C -8 -8 -12 -20 0 -28 C 12 -20 8 -8 0 0" fill="#22c55e" transform="rotate(35) scale(0.8)" />
                <path d="M 0 0 C -8 -8 -12 -20 0 -28 C 12 -20 8 -8 0 0" fill="#22c55e" transform="rotate(-35) scale(0.8)" />
            </g>
            
            <!-- Daisy template -->
            <g id="flower-daisy">
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(30)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(60)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(90)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(120)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(150)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(180)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(210)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(240)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(270)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(300)" />
                <path d="M 0 0 C -4 -12 -6 -24 0 -35 C 6 -24 4 -12 0 0" fill="currentColor" transform="rotate(330)" />
                <circle cx="0" cy="0" r="8" fill="#facc15" />
            </g>
            
            <!-- Rose template -->
            <g id="flower-rose">
                <!-- Outer petals -->
                <circle cx="0" cy="-10" r="15" fill="currentColor" opacity="0.9" />
                <circle cx="10" cy="5" r="15" fill="currentColor" opacity="0.9" transform="rotate(72)" />
                <circle cx="-10" cy="5" r="15" fill="currentColor" opacity="0.9" transform="rotate(144)" />
                <circle cx="0" cy="10" r="15" fill="currentColor" opacity="0.9" transform="rotate(216)" />
                <circle cx="-5" cy="-8" r="15" fill="currentColor" opacity="0.9" transform="rotate(288)" />
                <!-- Middle petals -->
                <circle cx="0" cy="-6" r="11" fill="currentColor" />
                <circle cx="6" cy="3" r="11" fill="currentColor" transform="rotate(60)" />
                <circle cx="-6" cy="3" r="11" fill="currentColor" transform="rotate(120)" />
                <circle cx="0" cy="6" r="11" fill="currentColor" transform="rotate(180)" />
                <circle cx="-3" cy="-5" r="11" fill="currentColor" transform="rotate(240)" />
                <circle cx="3" cy="-5" r="11" fill="currentColor" transform="rotate(300)" />
                <!-- Center Core -->
                <circle cx="0" cy="0" r="5" fill="#fef08a" />
            </g>
            
            <!-- Sakura template -->
            <g id="flower-sakura">
                <path d="M 0 0 C -8 -12 -12 -20 -4 -26 C 0 -28 0 -24 0 -24 C 0 -24 0 -28 4 -26 C 12 -20 8 -12 0 0" fill="currentColor" />
                <path d="M 0 0 C -8 -12 -12 -20 -4 -26 C 0 -28 0 -24 0 -24 C 0 -24 0 -28 4 -26 C 12 -20 8 -12 0 0" fill="currentColor" transform="rotate(72)" />
                <path d="M 0 0 C -8 -12 -12 -20 -4 -26 C 0 -28 0 -24 0 -24 C 0 -24 0 -28 4 -26 C 12 -20 8 -12 0 0" fill="currentColor" transform="rotate(144)" />
                <path d="M 0 0 C -8 -12 -12 -20 -4 -26 C 0 -28 0 -24 0 -24 C 0 -24 0 -28 4 -26 C 12 -20 8 -12 0 0" fill="currentColor" transform="rotate(216)" />
                <path d="M 0 0 C -8 -12 -12 -20 -4 -26 C 0 -28 0 -24 0 -24 C 0 -24 0 -28 4 -26 C 12 -20 8 -12 0 0" fill="currentColor" transform="rotate(288)" />
                <circle cx="0" cy="0" r="4" fill="#fb7185" />
            </g>
            
            <!-- Hydrangea template (blossom) -->
            <g id="flower-blossom">
                <ellipse cx="0" cy="-10" rx="7" ry="10" fill="currentColor" />
                <ellipse cx="10" cy="0" rx="10" ry="7" fill="currentColor" />
                <ellipse cx="0" cy="10" rx="7" ry="10" fill="currentColor" />
                <ellipse cx="-10" cy="0" rx="10" ry="7" fill="currentColor" />
                <circle cx="0" cy="0" r="4" fill="#fef08a" />
            </g>
        </defs>
    </svg>
    
    <!-- Flower Blooming Overlay -->
    <div id="flower-container" class="fixed inset-0 z-50 bg-[#faf9f5] transition-all duration-[1500ms] ease-in-out overflow-hidden">
    </div>

    <!-- Main Secret Card Content -->
    <div id="secret-card" class="max-w-md w-full bg-white/80 backdrop-blur-xl border border-white p-12 rounded-[3rem] shadow-2xl shadow-pink-200/50 text-center opacity-0 translate-y-8 pointer-events-none transition-all duration-1000 ease-out z-[60]">
        <div class="mb-8 inline-flex items-center justify-center w-16 h-16 bg-pink-100 rounded-full shadow-inner animate-bounce">
            <span class="text-2xl">✉️</span>
        </div>
        
        <h1 class="text-3xl font-black text-pink-950 mb-6 tracking-tight">You found it!</h1>
        
        <p class="text-pink-900/60 leading-relaxed mb-10 font-light text-base">
            "Sometimes the smallest step in the right direction ends up being the biggest step of your life."
            <br><br>
            Stay kind, stay loving, and keep spreading the magic.
        </p>

        <a href="index.html" class="inline-block text-sm font-bold text-pink-500 hover:text-pink-600 transition-colors hover:scale-105 active:scale-95 duration-300">
            &larr; Back to Home
        </a>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 right-0 w-64 h-64 bg-pink-200/20 blur-[100px] rounded-full -mr-32 -mt-32"></div>
    <div class="fixed bottom-0 left-0 w-64 h-64 bg-rose-200/20 blur-[100px] rounded-full -ml-32 -mb-32"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('flower-container');
            if (!container) return;

            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // Grid cell size: smaller on mobile for density
            const cellSize = width < 768 ? 75 : 95;
            
            const cols = Math.ceil(width / cellSize) + 1;
            const rows = Math.ceil(height / cellSize) + 1;
            
            const templates = ['flower-daisy', 'flower-rose', 'flower-sakura', 'flower-blossom'];
            
            // Highly curated romantic floral color palette matching the photo
            const romanticPalette = [
                '#e11d48', '#f43f5e', '#ec4899', '#f472b6', '#fda4af', // Roses & pinks
                '#fbbf24', '#f59e0b', '#fef08a',                      // Golds & soft yellows
                '#a855f7', '#c084fc', '#e9d5ff',                      // Lavenders
                '#ffffff', '#f1f5f9', '#ffe4e6',                      // Whites & creams
                '#93c5fd', '#60a5fa', '#38bdf8',                      // Hydrangea blues
                '#fb923c', '#f97316'                                  // Peaches
            ];
            
            const fragment = document.createDocumentFragment();
            
            // Generate grid with organic random offset
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    // 20% background leaf, 80% flower
                    const isLeaf = Math.random() < 0.20;
                    const templateId = isLeaf ? 'flower-leaf' : templates[Math.floor(Math.random() * templates.length)];
                    
                    const baseX = c * cellSize;
                    const baseY = r * cellSize;
                    
                    // Offset to avoid static grid alignment
                    const offsetX = (Math.random() - 0.5) * cellSize * 0.9;
                    const offsetY = (Math.random() - 0.5) * cellSize * 0.9;
                    
                    const posX = baseX + offsetX;
                    const posY = baseY + offsetY;
                    
                    // Create SVG element
                    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    
                    // Flower size with generous multiplier to ensure dense overlapping
                    const sizeMultiplier = isLeaf ? (Math.random() * 0.7 + 0.9) : (Math.random() * 0.7 + 1.3);
                    const size = cellSize * sizeMultiplier;
                    
                    svg.setAttribute('class', 'absolute blooming-item pointer-events-none drop-shadow-md');
                    svg.setAttribute('viewBox', '-50 -50 100 100');
                    svg.style.width = size + 'px';
                    svg.style.height = size + 'px';
                    
                    // Position using pixels
                    svg.style.left = (posX - size / 2) + 'px';
                    svg.style.top = (posY - size / 2) + 'px';
                    
                    // Set rotation/scaling variables
                    const rotStart = (Math.random() * 120 - 60) + 'deg';
                    const rotEnd = (Math.random() * 360) + 'deg';
                    svg.style.setProperty('--rot-start', rotStart);
                    svg.style.setProperty('--rot-end', rotEnd);
                    svg.style.setProperty('--scale-end', '1');
                    
                    // Center-outward ripple timing
                    const centerX = width / 2;
                    const centerY = height / 2;
                    const dist = Math.sqrt(Math.pow(posX - centerX, 2) + Math.pow(posY - centerY, 2));
                    const maxDist = Math.sqrt(Math.pow(width, 2) + Math.pow(height, 2));
                    
                    const delay = ((dist / maxDist) * 2.4 + Math.random() * 0.8).toFixed(2) + 's';
                    svg.style.animationDelay = delay;
                    
                    // Apply colors
                    if (!isLeaf) {
                        const color = romanticPalette[Math.floor(Math.random() * romanticPalette.length)];
                        svg.style.color = color;
                    }
                    
                    // Reference template
                    const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
                    use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#' + templateId);
                    svg.appendChild(use);
                    
                    fragment.appendChild(svg);
                }
            }
            
            container.appendChild(fragment);

            // Floating hearts
            const createFloatingHeart = () => {
                if (container.classList.contains('opacity-0')) return;
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'absolute text-xs pointer-events-none text-pink-400/40 select-none z-30';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                
                const size = Math.random() * 14 + 8;
                heart.style.fontSize = size + 'px';
                
                const duration = Math.random() * 3 + 4;
                heart.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-out`;
                container.appendChild(heart);

                requestAnimationFrame(() => {
                    heart.style.transform = `translateY(-105vh) translateX(${(Math.random() - 0.5) * 120}px) rotate(${Math.random() * 360}deg)`;
                });

                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
            };

            const heartInterval = setInterval(createFloatingHeart, 300);

            // After 5.0 seconds, reveal the card on top of the flower wall
            setTimeout(() => {
                const secretCard = document.getElementById('secret-card');
                if (secretCard) {
                    secretCard.classList.remove('opacity-0', 'translate-y-8', 'pointer-events-none');
                    secretCard.classList.add('opacity-100', 'translate-y-0');
                }
            }, 5000);
        });
    </script>
</body>
</html>
